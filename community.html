<main>


<section class="page-header">

<h1>💬 Student Community</h1>

<p>

Share ideas, discuss learning experiences, and connect with students.

</p>

</section>



<section class="community-card">


<div id="app">


<h2>

Student Discussion Forum

</h2>



<input

type="text"

v-model="newComment"

placeholder="Write your comment...">



<button @click="addComment">

Post Comment

</button>



<h2 class="comment-title">

Community Posts

</h2>



<ul>

<li v-for="(comment,index) in comments">

<span>

💬 {{ comment }}

</span>

<button @click="deleteComment(index)">

Delete

</button>

</li>

</ul>


</div>


</section>


</main>



<footer>
