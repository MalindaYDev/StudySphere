<section class="assignment-card">

<div class="form-group">

type="date"
id="dueDate">

</button>


</div>



<h2 class="table-title">

</h2>



<div class="table-container">


<table>


<thead>

<tr>

<th>Assignment</th>

<th>Due Date</th>

<th>Action</th>

</tr>

</thead>

</tbody>
